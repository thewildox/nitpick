services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nitpick
      POSTGRES_PASSWORD: nitpick
      POSTGRES_DB: nitpick
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nitpick"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
